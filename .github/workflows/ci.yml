name: CI — Build & Preview

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Allow one concurrent run per branch/PR
concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-and-preview:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (pyodide + vite)
        env:
          PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_POSTHOG_PROJECT_TOKEN }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: just build

      # Deploy every push/PR as a Cloudflare Pages *preview* deployment.
      # Wrangler uses the current branch name to generate a preview URL.
      # Production deployments are handled by release.yml on tagged releases.
      - name: Deploy to Cloudflare Pages (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --project-name=perotron-web
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Print preview URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          echo "Preview URL : $DEPLOYMENT_URL"
          echo "Branch alias: $ALIAS_URL"
